# Long-running GPU tests: statistical validation, multi-orientation inference,
# LER regression, and full-epoch training. NOT triggered by push/PR.
# See code/tests/README_TEST_TIERS.md for the tier model.

name: Long-running tests

on:
  schedule:
    # Daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      jobs:
        description: "Comma-separated job names to run (empty = all)"
        required: false
        default: ""
        type: string

env:
  PIP_NO_CACHE_DIR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_PREFER_BINARY: "1"

jobs:
  # ---------------------------------------------------------------------------
  # Statistical noise model tests (~15 min)
  # Runs the full test suite with RUN_SLOW=1 to enable >=100k-shot tests.
  # ---------------------------------------------------------------------------
  statistical-noise-model:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.jobs == '' || contains(inputs.jobs, 'statistical-noise-model')))
    runs-on: linux-amd64-gpu-rtxpro6000-latest-1
    container:
      image: ubuntu:22.04
      options: -u root --security-opt seccomp=unconfined --shm-size 16g
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
    timeout-minutes: 30
    steps:
      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        with:
          enable-apt: true

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y git git-lfs python3 python3-pip python3-venv
          git lfs install

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip install -r code/requirements_public_inference.txt

      - name: Verify GPU
        run: |
          nvidia-smi
          python3 -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'"

      - name: Run statistical noise model tests (RUN_SLOW=1)
        run: |
          RUN_SLOW=1 PYTHONPATH=code python3 -m unittest discover -s code/tests -p "test_noise_model.py" -v

  # ---------------------------------------------------------------------------
  # Multi-orientation inference (~30-60 min)
  # Inference over all 4 surface code orientations (O1-O4) with moderate shots.
  # ---------------------------------------------------------------------------
  orientation-inference:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.jobs == '' || contains(inputs.jobs, 'orientation-inference')))
    runs-on: linux-amd64-gpu-rtxpro6000-latest-1
    container:
      image: ubuntu:22.04
      options: -u root --security-opt seccomp=unconfined --shm-size 16g
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
    timeout-minutes: 90
    steps:
      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        with:
          enable-apt: true

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y git git-lfs python3 python3-pip python3-venv
          git lfs install

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip install -r code/requirements_public_train.txt

      - name: Verify GPU
        run: |
          nvidia-smi
          python3 -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'"

      - name: Inference over all orientations (O1-O4)
        run: ORIENTATIONS_LONG_TASK=inference bash code/scripts/run_orientations_long.sh
        env:
          EXPERIMENT_NAME: ci_orient
          PREDECODER_INFERENCE_NUM_SAMPLES: "1024"
          PREDECODER_INFERENCE_LATENCY_SAMPLES: "0"
          PREDECODER_INFERENCE_NUM_WORKERS: "0"

  # ---------------------------------------------------------------------------
  # LER regression check (~30-60 min)
  # Evaluates LER at multiple distances using pre-trained models.
  # ---------------------------------------------------------------------------
  ler-regression:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.jobs == '' || contains(inputs.jobs, 'ler-regression')))
    runs-on: linux-amd64-gpu-rtxpro6000-latest-1
    container:
      image: ubuntu:22.04
      options: -u root --security-opt seccomp=unconfined --shm-size 16g
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
    timeout-minutes: 60
    steps:
      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        with:
          enable-apt: true

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y git git-lfs python3 python3-pip python3-venv
          git lfs install

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip install -r code/requirements_public_inference.txt

      - name: Verify GPU
        run: |
          nvidia-smi
          python3 -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'"

      - name: LER regression (pre-trained models)
        run: |
          PYTHONPATH=code python3 -m unittest code.tests.test_inference_public_model -v

  # ---------------------------------------------------------------------------
  # Full 1-epoch training + LER validation (~30-60 min)
  # Trains 1 epoch with production-scale samples and validates LER threshold.
  # ---------------------------------------------------------------------------
  full-epoch-training:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.jobs == '' || contains(inputs.jobs, 'full-epoch-training')))
    runs-on: linux-amd64-gpu-rtxpro6000-latest-1
    container:
      image: ubuntu:22.04
      options: -u root --security-opt seccomp=unconfined --shm-size 16g
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
    timeout-minutes: 90
    steps:
      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        with:
          enable-apt: true

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y git git-lfs python3 python3-pip python3-venv
          git lfs install

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip install -r code/requirements_public_train.txt

      - name: Verify GPU
        run: |
          nvidia-smi
          python3 -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'"

      - name: Full 1-epoch training + inference
        run: bash code/scripts/smoke_run.sh
        env:
          EXPERIMENT_NAME: ci_full_epoch
          PREDECODER_TRAIN_SAMPLES: "2097152"
          PREDECODER_VAL_SAMPLES: "65536"
          PREDECODER_TEST_SAMPLES: "65536"
          PREDECODER_TRAIN_EPOCHS: "1"

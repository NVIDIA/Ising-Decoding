exp_tag: color_m1_s_LR3e-4_d9r9
output: ${oc.env:PREDECODER_BASE_OUTPUT_DIR,outputs}/${exp_tag}
resume_dir: ${output}/models

hydra:
  run:
    dir: ${output}
  output_subdir: hydra

enable_fp16: false
enable_bf16: false
enable_matmul_tf32: true
enable_cudnn_tf32: true
enable_cudnn_benchmark: false
torch_compile: true
torch_compile_mode: default
load_checkpoint: false

# Code-family
code: color
distance: 9
n_rounds: 9
meas_basis: both

workflow:
  task: train

data:
  superdense: true
  schedule: nearest-neighbor
  enable_z_feedforward: true
  apply_data_x_override: true

  # HE settings
  timelike_he: false
  num_he_cycles: 1
  use_weight2_timelike: false
  use_weight3_timelike: false
  max_passes_w1: 8
  max_passes_w2: 4
  max_passes_w3: 4
  decompose_y: false

  # Noise
  p_error: null
  p_min: 0.0029
  p_max: 0.0031
  error_mode: circuit_level_color_code
  precomputed_frames_dir: null

model:
  version: predecoder_memory_v1
  dropout_p: 0.01
  activation: gelu
  num_filters: [128, 128, 128, 16]  # widen head COUT past out_channels=4 for better TRT cutlass tile on B200; downstream sees first 4 channels (slice in forward)
  kernel_size: [3, 3, 3, 3]
  input_channels: 4
  out_channels: 4

datapipe: memory
data_method: train

train:
  num_samples: 16777216
  accumulate_steps: 2
  checkpoint_interval: 1
  save_every_datasets: 0
  epochs: 100

val:
  num_samples: 65536
  threshold: 0.0
  trials: 1

optimizer_type: Lion
optimizer:
  lr: 3e-4
  weight_decay: 1e-7
  beta2: 0.95

lr_scheduler:
  type: warmup_then_decay
  warmup_steps: 100
  milestones: [0.25, 0.5, 1.0]
  gamma: 0.7
  min_lr: 1e-6

batch_schedule:
  enabled: true
  initial: 256
  final: 1024
  start_epoch: 0
  end_epoch: 1

validation_ler: true
early_stopping:
  enabled: false
  patience: 999

time_based_early_stopping:
  enabled: false
  safety_margin_minutes: 5

ema:
  use_ema: true
  decay: 0.0001

test:
  num_samples: 262144
  trials: 1
  distance: 5
  n_rounds: 20
  noise_model: none
  p_error: 0.001
  meas_basis_test: both
  use_model_checkpoint: 0
  th_data: 0.0
  th_syn: 0.0
  sampling_mode: threshold
  temperature: 1.0
  dataloader:
    batch_size: 1024
    num_workers: 0
    pin_memory: true

# =============================================================================
# Color Code Threshold — model1-shaped D=13 accuracy check
#
# Use this after training config_color_model_1_s_LR1e-4_d13r13.  Set
# model_checkpoint_dir to that run's output/models directory.  The default sweep
# evaluates D=13,T=13; override threshold.n_rounds=[52] for the T=4D check.
#
# Usage:
#   python code/workflows/run.py --config-name=config_color_threshold_model_1_d13 \
#       model_checkpoint_dir=/path/to/color_m1_s_LR1e-4_d13r13/models \
#       output=/path/to/threshold/output
# =============================================================================

exp_tag: color_threshold_m1_d13
output: ${oc.env:PREDECODER_BASE_OUTPUT_DIR,outputs}/${exp_tag}
resume_dir: ${output}/models

hydra:
  run:
    dir: ${output}
  output_subdir: hydra

model_checkpoint_dir: ${output}/models

enable_fp16: false
enable_bf16: false
enable_matmul_tf32: true
enable_cudnn_tf32: true
enable_cudnn_benchmark: false
torch_compile: false
torch_compile_mode: default
load_checkpoint: false

code: color
distance: 13
n_rounds: 13
meas_basis: both

workflow:
  task: threshold

data:
  superdense: true
  schedule: nearest-neighbor
  enable_z_feedforward: true
  apply_round_end_x_wr_to_carry: true
  apply_round_end_x_fe_to_carry: true
  max_round_end_wr_fe: 4

  timelike_he: false
  num_he_cycles: 1
  use_weight2_timelike: false
  use_weight3_timelike: false
  max_passes_w1: 8
  max_passes_w2: 4
  max_passes_w3: 4
  decompose_y: false

  p_error: null
  p_min: 0.0009
  p_max: 0.0011
  error_mode: circuit_level_color_code
  precomputed_frames_dir: null

model:
  version: predecoder_memory_v1
  dropout_p: 0.01
  activation: gelu
  num_filters: [128, 128, 128, 4]
  kernel_size: [3, 3, 3, 3]
  input_channels: 4
  out_channels: 4

threshold:
  distances: [13]
  p_values: [0.0005, 0.001, 0.002, 0.003]
  n_rounds: [13]

test:
  num_samples: 65536
  trials: 1
  distance: 13
  n_rounds: 13
  noise_model_family: legacy
  noise_instruction_semantics: current
  noise_mode: legacy
  gidney_style_noise: false
  noise_model: none
  p_error: 0.001
  meas_basis_test: both
  use_model_checkpoint: -1
  th_data: 0.0
  th_syn: 0.0
  sampling_mode: threshold
  temperature: 1.0
  dataloader:
    batch_size: 1024
    num_workers: 4
    persistent_workers: true
    prefetch_factor: 2
    pin_memory: true

datapipe: memory
data_method: test

optimizer_type: Lion
optimizer:
  lr: 1e-4
  weight_decay: 1e-7
  beta2: 0.95
lr_scheduler:
  type: warmup_then_decay
  warmup_steps: 100
  milestones: [0.25, 0.5, 1.0]
  gamma: 0.7
  min_lr: 1e-6
train:
  num_samples: 67108864
  accumulate_steps: 2
  checkpoint_interval: 1
  save_every_datasets: 0
  epochs: 100
val:
  num_samples: 65536
  threshold: 0.0
  trials: 1
batch_schedule:
  enabled: true
  initial: 256
  final: 512
  start_epoch: 0
  end_epoch: 1
validation_ler: true
early_stopping:
  enabled: false
  patience: 999
time_based_early_stopping:
  enabled: false
  safety_margin_minutes: 5
ema:
  use_ema: true
  decay: 0.0001
